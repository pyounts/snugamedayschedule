<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNU Athletics — Game Day Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --crimson:#A90533; --crimson-dk:#7d0325; --crimson-bg:#fdf0f2;
  --gray:#BCBEC0; --gray-dk:#7a7c7e; --gray-md:#dddfe1; --gray-lt:#f4f4f5;
  --ink:#1a1a1a; --ink-soft:#505254; --white:#ffffff;
  --green:#1e6b3c; --green-bg:#d9f0e4;
  --blue:#1a4e8a; --blue-bg:#d6e8f8;
  --amber:#8a4a00; --amber-bg:#fde8cc;
  --fd:'Oswald',sans-serif; --fb:'Source Sans 3',sans-serif;
  --r:6px; --rlg:10px; --shadow:0 2px 14px rgba(0,0,0,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--gray-lt);color:var(--ink);font-size:15px;min-height:100vh}

.hdr{background:var(--crimson);padding:0 2rem;display:flex;align-items:center;gap:14px;border-bottom:4px solid var(--crimson-dk);box-shadow:0 2px 10px rgba(169,5,51,.3);position:sticky;top:0;z-index:200}
.hdr-icon{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:10px 0}
.hdr-text{flex:1}
.hdr-text h1{font-family:var(--fd);font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--white);line-height:1.1}
.hdr-text p{font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.8px;text-transform:uppercase;margin-top:1px}

.wrap{max-width:1060px;margin:0 auto;padding:1.75rem 1.5rem}

.filter-card{background:var(--white);border-radius:var(--rlg);box-shadow:var(--shadow);padding:1.25rem 1.5rem;margin-bottom:1rem}
.filter-title{font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray-dk);margin-bottom:.875rem}
.filter-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.filter-field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:180px}
.filter-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-dk)}
.filter-field select{font-family:var(--fb);font-size:14px;color:var(--ink);background:var(--white);border:1.5px solid var(--gray-md);border-radius:var(--r);padding:9px 10px;width:100%;outline:none;transition:border-color .15s;cursor:pointer}
.filter-field select:focus{border-color:var(--crimson)}
.btn-clear{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:9px 16px;border-radius:var(--r);border:2px solid var(--gray-md);background:transparent;color:var(--ink-soft);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-clear:hover{border-color:var(--crimson);color:var(--crimson)}

.results-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.results-title{font-family:var(--fd);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft)}
.vtoggle{display:flex;border:1.5px solid var(--gray-md);border-radius:var(--r);overflow:hidden}
.vtoggle button{font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:6px 13px;background:var(--white);border:none;color:var(--gray-dk);cursor:pointer;transition:all .15s}
.vtoggle button.on{background:var(--crimson);color:var(--white)}
.vtoggle button:not(.on):hover{background:var(--crimson-bg);color:var(--crimson)}

.panel{background:var(--white);border-radius:var(--rlg);box-shadow:var(--shadow);padding:1.5rem;margin-bottom:.5rem}

.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;gap:.875rem;color:var(--gray-dk);text-align:center}
.spinner{width:32px;height:32px;border:3px solid var(--gray-md);border-top-color:var(--crimson);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-msg p{font-size:14px;max-width:420px;line-height:1.55}
.retry-btn{padding:8px 18px;background:var(--crimson);color:#fff;border:none;border-radius:var(--r);font-family:var(--fd);font-size:13px;font-weight:600;text-transform:uppercase;cursor:pointer;letter-spacing:.4px}
.retry-btn:hover{background:var(--crimson-dk)}
.retry-btn.gray{background:var(--gray-dk)}

.sync-row{text-align:right;font-size:11px;color:var(--gray-dk);padding:.25rem .25rem .5rem;display:flex;justify-content:flex-end;align-items:center;gap:6px}
.refresh-btn{background:none;border:none;color:var(--crimson);font-size:12px;cursor:pointer;font-family:var(--fb);text-decoration:underline;padding:0}

.sec-label{font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray-dk);padding-bottom:6px;border-bottom:1.5px solid var(--gray-md);margin:1.25rem 0 .875rem}
.sec-label:first-child{margin-top:0}

/* CARDS */
.game-card{border:2px solid var(--gray-md);border-radius:var(--rlg);margin-bottom:.875rem;overflow:hidden}
.game-card.has-mine{border-color:var(--crimson)}
.gc-head{background:var(--gray-lt);padding:.875rem 1.25rem;border-bottom:1.5px solid var(--gray-md)}
.gc-head.has-mine{background:var(--crimson-bg);border-bottom-color:rgba(169,5,51,.2)}
.gc-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px}
.gc-opp{font-family:var(--fd);font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink)}
.gc-meta{font-size:12px;color:var(--gray-dk)}
.gc-body{display:flex;flex-wrap:wrap;gap:10px;padding:1rem 1.25rem}
.ac{flex:1;min-width:150px;max-width:220px;border:1.5px solid var(--gray-md);border-radius:var(--r);padding:9px 12px;background:var(--white)}
.ac.mine{border-color:var(--crimson);background:var(--crimson-bg)}
.ac-pos{font-size:12px;font-weight:600;color:var(--ink)}
.ac-name{font-size:12px;color:var(--gray-dk);margin-top:2px;font-style:italic}
.ac-name.un{color:var(--gray)}
.ac-time{font-family:var(--fd);font-size:22px;font-weight:700;color:var(--crimson);margin-top:5px;line-height:1}
.ac-time.tbd{font-size:13px;font-weight:500;color:var(--gray-dk);font-family:var(--fb)}
.ac-badge{margin-top:5px}

/* TABLE */
.tbl-wrap{border:1.5px solid var(--gray-md);border-radius:var(--rlg);overflow:hidden;margin-bottom:.875rem}
.sched-tbl{width:100%;border-collapse:collapse}
.sched-tbl thead th{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-dk);background:var(--gray-lt);padding:9px 14px;text-align:left;border-bottom:1.5px solid var(--gray-md)}
.sched-tbl tbody tr{border-bottom:1px solid var(--gray-md);transition:background .1s}
.sched-tbl tbody tr:last-child{border-bottom:none}
.sched-tbl tbody tr:hover{background:var(--crimson-bg)}
.sched-tbl tbody tr.mine-row{background:var(--crimson-bg)}
.sched-tbl tbody tr.mine-row td:first-child{border-left:3px solid var(--crimson)}
.sched-tbl td{padding:10px 14px;font-size:13px;vertical-align:middle}
.td-opp{font-weight:600;font-size:14px}
.td-sub{font-size:11px;color:var(--gray-dk);margin-top:2px}
.td-pos{font-weight:600}
.td-wk{color:var(--ink-soft)}
.td-wk.un{color:var(--gray);font-style:italic}
.td-arr{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--ink)}
.td-arr.mine-t{color:var(--crimson)}
.td-arr.tbd{font-size:13px;font-weight:400;color:var(--gray-dk);font-family:var(--fb)}

/* BADGES & CHIPS */
.badge{display:inline-block;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 7px;border-radius:4px}
.b-red{background:#fad8d8;color:var(--crimson)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-green{background:var(--green-bg);color:var(--green)}
.sc{display:inline-block;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:4px;white-space:nowrap}
.sc-soccer{background:#d9f0e4;color:#1e6b3c}
.sc-volleyball{background:#d6e8f8;color:#1a4e8a}
.sc-football{background:#fde8cc;color:#8a4a00}
.sc-basketball{background:#ede8fa;color:#4a1a8a}
.sc-rugby{background:#fdf0f2;color:var(--crimson)}
.sc-baseball{background:#d9f0e4;color:#1e6b3c}
.sc-softball{background:#fde8cc;color:#8a4a00}

.error-box{background:#fff5f5;border:2px solid #fcc;border-radius:var(--rlg);padding:1.25rem 1.5rem}
.error-box h3{font-family:var(--fd);font-size:14px;font-weight:700;text-transform:uppercase;color:var(--crimson);margin-bottom:.5rem}
.error-box ul{margin:.5rem 0 .5rem 1.25rem;line-height:1.8;font-size:13px}
.error-box .btn-row{margin-top:.875rem;display:flex;gap:8px;flex-wrap:wrap}

.debug-box{background:#1a1a1a;color:#a8ff78;border-radius:var(--r);padding:1rem;font-family:monospace;font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:320px;overflow-y:auto;margin-top:1rem}

@media(max-width:640px){
  .wrap{padding:1rem}
  .hdr{padding:0 1rem}
  .panel{padding:1rem}
  .filter-card{padding:1rem}
  .ac{min-width:140px}
  .sched-tbl th:nth-child(5),.sched-tbl td:nth-child(5){display:none}
}
@media print{
  .hdr,.filter-card,.results-bar,.sync-row{display:none!important}
  .panel{box-shadow:none;border-radius:0;padding:0}
  .badge,.sc{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-icon">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="8.5" stroke="white" stroke-width="2"/>
      <path d="M11 5v6l4 2.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="hdr-text">
    <h1>SNU Athletics</h1>
    <p>Game Day Staff Scheduler — 26–27</p>
  </div>
</header>

<div class="wrap">
  <div class="filter-card">
    <div class="filter-title">Find Your Schedule</div>
    <div class="filter-row">
      <div class="filter-field">
        <label class="filter-label" for="sportSel">Sport</label>
        <select id="sportSel" onchange="onFilterChange()">
          <option value="">— All sports —</option>
        </select>
      </div>
      <div class="filter-field">
        <label class="filter-label" for="workerSel">My Name</label>
        <select id="workerSel" onchange="onFilterChange()">
          <option value="">— All workers —</option>
        </select>
      </div>
      <button class="btn-clear" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="results-bar" id="resultsBar" style="display:none">
    <span class="results-title" id="resultsTitle"></span>
    <div class="vtoggle">
      <button id="vtCard" class="on" onclick="setView('card')">&#9647; Cards</button>
      <button id="vtTable" onclick="setView('table')">&#9776; Table</button>
    </div>
  </div>

  <div class="panel" id="mainPanel">
    <div class="state-msg">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="18" r="14" stroke="#BCBEC0" stroke-width="2.5"/>
        <path d="M18 9v9l5 3" stroke="#BCBEC0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Select a sport or your name above to view your arrival schedule.</p>
    </div>
  </div>

  <div class="sync-row" id="syncRow" style="display:none">
    <span id="syncTime"></span>
    <button class="refresh-btn" onclick="hardRefresh()">&#8635; Refresh</button>
  </div>
</div>

<script>
// ─── SPORT LIST ────────────────────────────────────────────────
// To add a sport: add a new entry. gid = the tab's ID from the Google Sheet URL.
const SPORTS = [
  { label:"Women's Soccer",     gid:"0"          },
  { label:"Men's Soccer",       gid:"1015410633" },
  { label:"Volleyball",         gid:"971938409"  },
  { label:"Football",           gid:"1214538622" },
  { label:"Men's Basketball",   gid:"1109526714" },
  { label:"Women's Basketball", gid:"528085348"  },
  { label:"Baseball",           gid:"36202340"   },
  { label:"Softball",           gid:"1232068872" },
  { label:"Men's Rugby",        gid:"1275727010" },
  { label:"Women's Rugby",      gid:"1280706141" },
];

const SHEET_BASE =
  "https://docs.google.com/spreadsheets/d/e/" +
  "2PACX-1vRe5hngccHSK9hhYFRylTBAGeyfzMLQsGoCzop7zxVC9D7wKtwxKYS9WvK5nKt1_MfUddh5NrL3-O0t" +
  "/pub";

// ─── STATE ─────────────────────────────────────────────────────
var cache       = {};   // gid -> { positions, arrivalMins, games, sport }
var inFlight    = {};   // gid -> Promise (prevents duplicate requests)
var allWorkers  = [];   // sorted list of all worker names seen
var workerSet   = {};   // name -> true  (fast dedup)
var viewMode    = "card";
var filterSport = "";
var filterWorker= "";
var dbgLines    = [];

// ─── LOGGING ───────────────────────────────────────────────────
function log(msg) {
  dbgLines.push(msg);
  console.log("[SNU]", msg);
}

// ─── CSV PARSER ────────────────────────────────────────────────
function parseCSV(text) {
  var rows = [], row = [], field = "", inQ = false;
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (inQ) {
      if (ch === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (ch === '"') { inQ = false; }
      else { field += ch; }
    } else {
      if      (ch === '"')                { inQ = true; }
      else if (ch === ',')                { row.push(field.trim()); field = ""; }
      else if (ch === '\n' || ch === '\r') {
        row.push(field.trim());
        if (row.some(function(f){ return f !== ""; })) rows.push(row);
        row = []; field = "";
        if (ch === '\r' && text[i+1] === '\n') i++;
      } else { field += ch; }
    }
  }
  row.push(field.trim());
  if (row.some(function(f){ return f !== ""; })) rows.push(row);
  return rows;
}

// ─── SHEET PARSER ──────────────────────────────────────────────
// Expected layout:
//   Row 0:   Date | Time | Opponent | Pos1 | Pos2 | ...
//   Rows 1+: game data
//   Divider: any row containing "arrival" in any cell
//            → that row's columns 3+ = minutes before game
//            → OR the next row has the minutes
function parseSheet(text, sportLabel) {
  var rows = parseCSV(text);
  log(sportLabel + ": " + rows.length + " CSV rows");
  if (rows.length < 2) { log("Too few rows"); return null; }

  var headers   = rows[0].map(function(h){ return h.trim(); });
  var positions = headers.slice(3).filter(function(h){ return h !== ""; });
  log(sportLabel + " positions: " + positions.join(", "));
  if (!positions.length) { log("No positions found"); return null; }

  // Find arrival divider row
  var divIdx = -1;
  for (var i = 1; i < rows.length; i++) {
    for (var ci = 0; ci < rows[i].length; ci++) {
      if ((rows[i][ci] || "").toLowerCase().indexOf("arrival") !== -1) {
        divIdx = i;
        break;
      }
    }
    if (divIdx !== -1) break;
  }
  log(sportLabel + ": arrival row at index " + divIdx);

  // Parse arrival minutes — try same row, then next row
  var arrivalMins = {};
  if (divIdx !== -1) {
    var candidates = [rows[divIdx]];
    if (rows[divIdx + 1]) candidates.push(rows[divIdx + 1]);
    for (var ci2 = 0; ci2 < candidates.length; ci2++) {
      var aRow = candidates[ci2];
      var found = false;
      for (var pi = 0; pi < positions.length; pi++) {
        var v = parseFloat((aRow[3 + pi] || "").trim());
        if (!isNaN(v) && arrivalMins[positions[pi]] == null) {
          arrivalMins[positions[pi]] = v;
          found = true;
        }
      }
      if (found) break;
    }
  }
  log(sportLabel + " arrivalMins: " + JSON.stringify(arrivalMins));

  // Parse games
  var endIdx = divIdx !== -1 ? divIdx : rows.length;
  var games = [];
  for (var gi = 1; gi < endIdx; gi++) {
    var row  = rows[gi];
    var date = (row[0] || "").trim();
    var time = (row[1] || "").trim();
    var opp  = (row[2] || "").trim();
    if (!date || !opp) continue;
    if (/^-+$/.test(opp) || /^opponent$/i.test(opp) || /^date$/i.test(date)) continue;

    var workers = {};
    for (var wi = 0; wi < positions.length; wi++) {
      var name = (row[3 + wi] || "").trim();
      if (name) {
        workers[positions[wi]] = name;
        if (!workerSet[name]) {
          workerSet[name] = true;
          allWorkers.push(name);
          allWorkers.sort();
        }
      }
    }
    games.push({ date: date, time: time, opp: opp, workers: workers, sport: sportLabel });
  }
  log(sportLabel + ": " + games.length + " games");
  return { positions: positions, arrivalMins: arrivalMins, games: games, sport: sportLabel };
}

// ─── FETCH ─────────────────────────────────────────────────────
function fetchCSV(gid) {
  if (inFlight[gid]) return inFlight[gid];

  var url = SHEET_BASE + "?gid=" + gid + "&single=true&output=csv";

  inFlight[gid] = fetch(url, { redirect: "follow" })
    .then(function(r) {
      log("gid=" + gid + " direct status=" + r.status);
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function(text) {
      if (!text || text.trim().length < 20 || text.trim().charAt(0) === "<") {
        throw new Error("Got HTML instead of CSV");
      }
      log("gid=" + gid + " direct OK, len=" + text.length);
      return text;
    })
    .catch(function(err) {
      log("gid=" + gid + " direct failed: " + err.message + " — trying proxy");
      var proxy = "https://corsproxy.io/?" + encodeURIComponent(url);
      return fetch(proxy)
        .then(function(r) {
          log("gid=" + gid + " proxy status=" + r.status);
          if (!r.ok) throw new Error("Proxy HTTP " + r.status);
          return r.text();
        })
        .then(function(text) {
          if (!text || text.trim().length < 20 || text.trim().charAt(0) === "<") {
            throw new Error("Proxy returned HTML");
          }
          log("gid=" + gid + " proxy OK, len=" + text.length);
          return text;
        });
    })
    .finally(function() {
      delete inFlight[gid];
    });

  return inFlight[gid];
}

function loadSport(idx) {
  var sport = SPORTS[idx];
  if (cache[sport.gid]) return Promise.resolve(cache[sport.gid]);
  return fetchCSV(sport.gid)
    .then(function(text) {
      var data = parseSheet(text, sport.label);
      if (data) cache[sport.gid] = data;
      return data;
    })
    .catch(function(err) {
      log("loadSport failed [" + sport.label + "]: " + err.message);
      return null;
    });
}

function loadAll() {
  var promises = SPORTS.map(function(_, i){ return loadSport(i); });
  return Promise.all(promises).then(function() {
    populateWorkerDropdown();
    if (filterSport !== "" || filterWorker) render();
  });
}

// ─── HELPERS ───────────────────────────────────────────────────
function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function dateMs(raw) {
  if (!raw) return Infinity;
  var s = String(raw).trim();
  // Strip a trailing time component if present, e.g. "8/27/2026 0:00:00" -> "8/27/2026"
  s = s.replace(/\s+\d{1,2}:\d{2}(:\d{2})?\s*(AM|PM)?$/i, "").trim();
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) { var yr = +m[3]; if (yr < 100) yr += 2000; return new Date(yr, +m[1]-1, +m[2]).getTime(); }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]).getTime();
  // Last resort: let the browser try to parse it natively
  var native = new Date(s);
  if (!isNaN(native.getTime())) return native.getTime();
  return Infinity;
}

function fmtDate(raw) {
  if (!raw) return "";
  var s = String(raw).trim().replace(/\s+\d{1,2}:\d{2}(:\d{2})?\s*(AM|PM)?$/i, "").trim();
  var m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (m) {
    var yr = +m[3]; if (yr < 100) yr += 2000;
    return new Date(yr, +m[1]-1, +m[2]).toLocaleDateString("en-US",
      {weekday:"short",month:"short",day:"numeric",year:"numeric"});
  }
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(+m[1],+m[2]-1,+m[3]).toLocaleDateString("en-US",
    {weekday:"short",month:"short",day:"numeric",year:"numeric"});
  return s;
}

function isPast(raw) {
  var t = dateMs(raw);
  if (t === Infinity) return false;
  var today = new Date(); today.setHours(0,0,0,0);
  return t < today.getTime();
}

function parseTime(raw) {
  if (!raw || /^\s*$/.test(raw) || /tbd/i.test(raw)) return null;
  var s = raw.trim(), m;
  m = s.match(/^(\d{1,2}):(\d{2})\s*(am|pm)$/i);
  if (m) {
    var h=+m[1], mn=+m[2], ap=m[3].toUpperCase();
    if (ap==="PM"&&h!==12) h+=12;
    if (ap==="AM"&&h===12) h=0;
    return {h:h,m:mn};
  }
  m = s.match(/^(\d{1,2}):(\d{2})$/);
  if (m) return {h:+m[1],m:+m[2]};
  m = s.match(/^(\d{1,2})\s*(am|pm)$/i);
  if (m) {
    var h2=+m[1], ap2=m[2].toUpperCase();
    if (ap2==="PM"&&h2!==12) h2+=12;
    if (ap2==="AM"&&h2===12) h2=0;
    return {h:h2,m:0};
  }
  return null;
}

function fmtTime(h, m) {
  var ap = h>=12?"PM":"AM", hr = h%12===0?12:h%12;
  return hr+":"+(m<10?"0":"")+m+" "+ap;
}

function arriveAt(gh, gm, mins) {
  var norm = ((gh*60+gm-mins)%1440+1440)%1440;
  return {h:Math.floor(norm/60),m:norm%60};
}

function badgeCls(m) {
  return m>=90?"b-red":m>=60?"b-amber":m>=40?"b-blue":"b-green";
}

function sportCls(s) {
  if (s.indexOf("Soccer")     !== -1) return "sc sc-soccer";
  if (s.indexOf("Volleyball") !== -1) return "sc sc-volleyball";
  if (s.indexOf("Football")   !== -1) return "sc sc-football";
  if (s.indexOf("Basketball") !== -1) return "sc sc-basketball";
  if (s.indexOf("Rugby")      !== -1) return "sc sc-rugby";
  if (s === "Baseball")               return "sc sc-baseball";
  if (s === "Softball")               return "sc sc-softball";
  return "sc";
}

// ─── DROPDOWNS ─────────────────────────────────────────────────
function populateSportDropdown() {
  var sel = document.getElementById("sportSel");
  var html = '<option value="">— All sports —</option>';
  for (var i=0; i<SPORTS.length; i++) {
    html += '<option value="'+i+'">'+esc(SPORTS[i].label)+'</option>';
  }
  sel.innerHTML = html;
}

function populateWorkerDropdown() {
  var sel = document.getElementById("workerSel");
  var cur = sel.value;
  var html = '<option value="">— All workers —</option>';
  for (var i=0; i<allWorkers.length; i++) {
    var n = allWorkers[i];
    html += '<option value="'+esc(n)+'"'+(n===cur?' selected':'')+'>'+esc(n)+'</option>';
  }
  sel.innerHTML = html;
}

// ─── FILTER CONTROLS ───────────────────────────────────────────
function onFilterChange() {
  filterSport  = document.getElementById("sportSel").value;
  filterWorker = document.getElementById("workerSel").value;
  render();
}

function clearFilters() {
  document.getElementById("sportSel").value  = "";
  document.getElementById("workerSel").value = "";
  filterSport = ""; filterWorker = "";
  render();
}

function setView(v) {
  viewMode = v;
  document.getElementById("vtCard").className  = v==="card"  ? "on" : "";
  document.getElementById("vtTable").className = v==="table" ? "on" : "";
  render();
}

// ─── RENDER ────────────────────────────────────────────────────
function setPanel(html) {
  document.getElementById("mainPanel").innerHTML = html;
}

function render() {
  var resultsBar = document.getElementById("resultsBar");
  var syncRow    = document.getElementById("syncRow");

  if (filterSport === "" && !filterWorker) {
    resultsBar.style.display = "none";
    syncRow.style.display    = "none";
    setPanel('<div class="state-msg">' +
      '<svg width="36" height="36" viewBox="0 0 36 36" fill="none">' +
        '<circle cx="18" cy="18" r="14" stroke="#BCBEC0" stroke-width="2.5"/>' +
        '<path d="M18 9v9l5 3" stroke="#BCBEC0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg>' +
      '<p>Select a sport or your name above to view your arrival schedule.</p>' +
    '</div>');
    return;
  }

  // Which sport indices to show
  var idxs = [];
  if (filterSport !== "") {
    idxs = [parseInt(filterSport, 10)];
  } else {
    for (var i=0; i<SPORTS.length; i++) idxs.push(i);
  }

  // Kick off missing loads
  var needsLoad = false;
  for (var ii=0; ii<idxs.length; ii++) {
    var gid = SPORTS[idxs[ii]].gid;
    if (!cache[gid] && !inFlight[gid]) {
      needsLoad = true;
      (function(idx){ loadSport(idx).then(render); })(idxs[ii]);
    }
  }

  // Collect matching upcoming games
  var rows = [];
  for (var ji=0; ji<idxs.length; ji++) {
    var data = cache[SPORTS[idxs[ji]].gid];
    if (!data) continue;
    for (var gi=0; gi<data.games.length; gi++) {
      var g = data.games[gi];
      if (isPast(g.date)) continue;
      if (filterWorker) {
        var found = false;
        var wkeys = Object.keys(g.workers);
        for (var wk=0; wk<wkeys.length; wk++) {
          if (g.workers[wkeys[wk]] === filterWorker) { found=true; break; }
        }
        if (!found) continue;
      }
      rows.push({game:g, data:data});
    }
  }

  // Results bar
  resultsBar.style.display = "flex";
  var parts = [];
  if (filterSport !== "") parts.push(SPORTS[parseInt(filterSport,10)].label);
  if (filterWorker)       parts.push(filterWorker);
  document.getElementById("resultsTitle").textContent =
    parts.length ? parts.join(" — ") : "All upcoming games";

  // Check load state
  var anyLoading = false;
  for (var li=0; li<idxs.length; li++) {
    if (inFlight[SPORTS[idxs[li]].gid]) { anyLoading=true; break; }
  }
  var allFailed = true;
  for (var fi=0; fi<idxs.length; fi++) {
    if (cache[SPORTS[idxs[fi]].gid] || inFlight[SPORTS[idxs[fi]].gid]) { allFailed=false; break; }
  }

  if (!rows.length && anyLoading) {
    syncRow.style.display = "none";
    setPanel('<div class="state-msg"><div class="spinner"></div><p>Loading schedule from Google Sheets…</p></div>');
    return;
  }

  if (!rows.length && allFailed) {
    syncRow.style.display = "none";
    setPanel('<div class="error-box">' +
      '<h3>⚠️ Could not load schedule</h3>' +
      '<p>The scheduler could not fetch data from Google Sheets. Common causes:</p>' +
      '<ul>' +
        '<li>The Google Sheet is not published (File → Share → Publish to web)</li>' +
        '<li>A temporary network issue — try refreshing</li>' +
      '</ul>' +
      '<div class="btn-row">' +
        '<button class="retry-btn" onclick="hardRefresh()">Retry</button>' +
        '<button class="retry-btn gray" onclick="showDebug()">Debug Log</button>' +
      '</div>' +
    '</div>');
    return;
  }

  if (!rows.length) {
    syncRow.style.display = "none";
    // Build a quick diagnostic: show what raw dates were actually found
    var diag = [];
    for (var di=0; di<idxs.length; di++) {
      var ddata = cache[SPORTS[idxs[di]].gid];
      if (!ddata) continue;
      diag.push(SPORTS[idxs[di]].label + ": " + ddata.games.length + " total rows parsed");
      for (var dgi=0; dgi<Math.min(ddata.games.length,3); dgi++) {
        var dg = ddata.games[dgi];
        diag.push("&nbsp;&nbsp;→ date=\"" + esc(dg.date) + "\" parsed=" + dateMs(dg.date) + " isPast=" + isPast(dg.date) + " opp=" + esc(dg.opp));
      }
    }
    setPanel('<div class="state-msg"><p>No upcoming games found' +
      (filterWorker ? ' for <strong>'+esc(filterWorker)+'</strong>' : '') +
      '.</p></div>' +
      '<div style="margin-top:1rem;padding:1rem;background:var(--gray-lt);border-radius:var(--r);font-size:12px;text-align:left">' +
      '<strong>Diagnostic info</strong><br>' + diag.join('<br>') +
      '</div>' +
      '<div style="margin-top:.75rem"><button class="retry-btn" onclick="showDebug()">Full Debug Log</button></div>');
    return;
  }

  // Sort all rows by date, with a stable secondary sort by opponent name
  // so ties (same date) don't shuffle between renders.
  rows.sort(function(a,b){
    var da = dateMs(a.game.date), db = dateMs(b.game.date);
    if (da !== db) return da - db;
    return (a.game.opp || "").localeCompare(b.game.opp || "");
  });
  log("Render order: " + rows.map(function(r){ return r.game.date+" "+r.game.sport+" vs "+r.game.opp; }).join(" | "));

  setPanel(viewMode==="card" ? buildCards(rows) : buildTable(rows));

  syncRow.style.display = "flex";
  var now = new Date();
  document.getElementById("syncTime").textContent =
    "Synced at " + now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}

// ─── CARD VIEW ─────────────────────────────────────────────────
function buildCards(rows) {
  var html = "";

  // When filtering by sport only (no worker): group by sport with section headers
  // Otherwise: flat date-ordered list, sport chip on every card
  var grouped = filterSport !== "" && !filterWorker;

  if (grouped) {
    // Only one sport anyway, so no section header needed — but keep consistent
    for (var ri=0; ri<rows.length; ri++) {
      html += cardHtml(rows[ri], false);
    }
  } else {
    // Multi-sport or worker view: flat, all sports shown via chip
    for (var ri=0; ri<rows.length; ri++) {
      html += cardHtml(rows[ri], true);
    }
  }

  return html || '<div class="state-msg"><p>No games found.</p></div>';
}

function cardHtml(rowObj, showSportChip) {
  var g    = rowObj.game;
  var data = rowObj.data;
  var gt   = parseTime(g.time);

  var mine = false;
  if (filterWorker) {
    var vv = Object.keys(g.workers);
    for (var vk=0; vk<vv.length; vk++) {
      if (g.workers[vv[vk]]===filterWorker) { mine=true; break; }
    }
  }

  var posList = [];
  for (var pi=0; pi<data.positions.length; pi++) {
    var pos = data.positions[pi];
    if (!filterWorker || g.workers[pos]===filterWorker) posList.push(pos);
  }
  if (!posList.length) return "";

  var headClass = "gc-head" + (mine?" has-mine":"");
  var cardClass = "game-card"+(mine?" has-mine":"");

  var html = '<div class="'+cardClass+'">';
  html += '<div class="'+headClass+'">';
  html += '<div class="gc-top">';
  html += '<span class="gc-opp">vs. '+esc(g.opp)+'</span>';
  if (showSportChip) html += '<span class="'+sportCls(g.sport)+'">'+esc(g.sport)+'</span>';
  html += '</div>';
  html += '<div class="gc-meta">'+esc(fmtDate(g.date));
  if (gt) html += ' &nbsp;·&nbsp; Game: '+fmtTime(gt.h,gt.m);
  else if (g.time) html += ' &nbsp;·&nbsp; '+esc(g.time);
  html += '</div></div>';
  html += '<div class="gc-body">';

  for (var pi2=0; pi2<posList.length; pi2++) {
    var pos2   = posList[pi2];
    var worker = g.workers[pos2] || "";
    var mins   = data.arrivalMins[pos2];
    var isMe   = filterWorker && worker===filterWorker;

    html += '<div class="ac'+(isMe?" mine":"")+'">';
    html += '<div class="ac-pos">'+esc(pos2)+'</div>';
    html += '<div class="ac-name'+(worker?"":" un")+'">'+esc(worker||"Unassigned")+'</div>';

    if (gt !== null && mins != null) {
      var at = arriveAt(gt.h, gt.m, mins);
      html += '<div class="ac-time">'+fmtTime(at.h,at.m)+'</div>';
      html += '<div class="ac-badge"><span class="badge '+badgeCls(mins)+'">'+mins+' min early</span></div>';
    } else if (gt === null) {
      html += '<div class="ac-time tbd">Game time TBD</div>';
    } else {
      html += '<div class="ac-time tbd">No arrival time set</div>';
    }
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

// ─── TABLE VIEW ────────────────────────────────────────────────
function buildTable(rows) {
  // Worker mode: one table, sport column included, date-sorted flat
  // Sport-only mode: one table per sport group (or single table)
  var workerMode = !!filterWorker;

  if (workerMode) {
    var trows = "";
    for (var ri=0; ri<rows.length; ri++) {
      var g    = rows[ri].game;
      var data = rows[ri].data;
      var gt   = parseTime(g.time);
      var pList = [];
      for (var pi=0; pi<data.positions.length; pi++) {
        if (g.workers[data.positions[pi]]===filterWorker) pList.push(data.positions[pi]);
      }
      for (var pi2=0; pi2<pList.length; pi2++) {
        var pos    = pList[pi2];
        var worker = g.workers[pos]||"";
        var mins   = data.arrivalMins[pos];
        var arrStr="TBD", arrCls="td-arr tbd";
        if (gt!==null && mins!=null) {
          var at=arriveAt(gt.h,gt.m,mins);
          arrStr=fmtTime(at.h,at.m); arrCls="td-arr mine-t";
        }
        trows += '<tr class="mine-row">';
        trows += '<td><div class="td-opp">'+esc(g.opp)+'</div>';
        trows += '<div class="td-sub">'+esc(fmtDate(g.date));
        if (g.time && g.time!=="TBD") trows += ' · '+esc(g.time);
        trows += '</div></td>';
        trows += '<td><span class="'+sportCls(g.sport)+'">'+esc(g.sport)+'</span></td>';
        trows += '<td class="td-pos">'+esc(pos)+'</td>';
        trows += '<td class="td-wk">'+esc(worker)+'</td>';
        trows += '<td class="'+arrCls+'">'+arrStr+'</td>';
        trows += '<td>'+(mins!=null?'<span class="badge '+badgeCls(mins)+'">'+mins+' min early</span>':'')+'</td>';
        trows += '</tr>';
      }
    }
    if (!trows) return '<div class="state-msg"><p>No upcoming games found for '+esc(filterWorker)+'.</p></div>';
    return '<div class="tbl-wrap"><table class="sched-tbl"><thead><tr>' +
      '<th>Game</th><th>Sport</th><th>Position</th><th>Worker</th><th>Arrive By</th><th>Lead</th>' +
      '</tr></thead><tbody>'+trows+'</tbody></table></div>';

  } else {
    // Group by sport; within each group, games are already date-sorted
    var groups = {};
    var order  = [];
    for (var ri2=0; ri2<rows.length; ri2++) {
      var sport = rows[ri2].game.sport;
      if (!groups[sport]) { groups[sport]=[]; order.push(sport); }
      groups[sport].push(rows[ri2]);
    }

    var html = "";
    for (var oi=0; oi<order.length; oi++) {
      var spt = order[oi];
      if (order.length > 1) {
        html += '<div class="sec-label"><span class="'+sportCls(spt)+'">'+esc(spt)+'</span></div>';
      }
      var trows2 = "";
      var grp = groups[spt];
      for (var gi=0; gi<grp.length; gi++) {
        var g2   = grp[gi].game;
        var d2   = grp[gi].data;
        var gt2  = parseTime(g2.time);
        for (var pi3=0; pi3<d2.positions.length; pi3++) {
          var pos3   = d2.positions[pi3];
          var worker3= g2.workers[pos3]||"";
          var mins3  = d2.arrivalMins[pos3];
          var arrStr3="TBD", arrCls3="td-arr tbd";
          if (gt2!==null && mins3!=null) {
            var at3=arriveAt(gt2.h,gt2.m,mins3);
            arrStr3=fmtTime(at3.h,at3.m); arrCls3="td-arr";
          }
          var showG = pi3===0;
          trows2 += '<tr>';
          trows2 += '<td>'+(showG
            ? '<div class="td-opp">'+esc(g2.opp)+'</div><div class="td-sub">'+esc(fmtDate(g2.date))+
              (g2.time&&g2.time!=="TBD"?' · '+esc(g2.time):'')+
              '</div><span class="'+sportCls(g2.sport)+'" style="margin-top:4px;display:inline-block">'+esc(g2.sport)+'</span>'
            : '&nbsp;')+'</td>';
          trows2 += '<td class="td-pos">'+esc(pos3)+'</td>';
          trows2 += '<td class="td-wk'+(worker3?"":" un")+'">'+(worker3?esc(worker3):"Unassigned")+'</td>';
          trows2 += '<td class="'+arrCls3+'">'+arrStr3+'</td>';
          trows2 += '<td>'+(mins3!=null?'<span class="badge '+badgeCls(mins3)+'">'+mins3+' min early</span>':'')+'</td>';
          trows2 += '</tr>';
        }
      }
      if (trows2) {
        html += '<div class="tbl-wrap"><table class="sched-tbl"><thead><tr>' +
          '<th>Game</th><th>Position</th><th>Worker</th><th>Arrive By</th><th>Lead</th>' +
          '</tr></thead><tbody>'+trows2+'</tbody></table></div>';
      }
    }
    return html || '<div class="state-msg"><p>No games found.</p></div>';
  }
}

// ─── DEBUG ─────────────────────────────────────────────────────
function showDebug() {
  setPanel(
    '<div style="font-family:var(--fd);font-size:13px;font-weight:700;text-transform:uppercase;margin-bottom:.75rem">Debug Log</div>' +
    '<div class="debug-box">'+esc(dbgLines.join("\n"))+'</div>' +
    '<div style="margin-top:.875rem;display:flex;gap:8px">' +
      '<button class="retry-btn" onclick="hardRefresh()">Retry</button>' +
      '<button class="retry-btn gray" onclick="render()">Back</button>' +
    '</div>'
  );
}

// ─── REFRESH ───────────────────────────────────────────────────
function hardRefresh() {
  cache={};inFlight={};allWorkers=[];workerSet={};dbgLines=[];
  populateWorkerDropdown();
  loadAll();
}

setInterval(function() {
  cache={};allWorkers=[];workerSet={};
  loadAll();
}, 5*60*1000);

// ─── INIT ──────────────────────────────────────────────────────
populateSportDropdown();
loadAll();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNU Athletics — Game Day Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght=500;600;700&family=Source+Sans+3:ital,wght=0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --crimson:#A90533; --crimson-dk:#7d0325; --crimson-bg:#fdf0f2;
  --gray:#BCBEC0; --gray-dk:#7a7c7e; --gray-md:#dddfe1; --gray-lt:#f4f4f5;
  --ink:#1a1a1a; --ink-soft:#505254; --white:#ffffff;
  --green:#1e6b3c; --green-bg:#d9f0e4;
  --blue:#1a4e8a;  --blue-bg:#d6e8f8;
  --amber:#8a4a00; --amber-bg:#fde8cc;
  --fd:'Oswald',sans-serif; --fb:'Source Sans 3',sans-serif;
  --r:6px; --rlg:10px; --shadow:0 2px 14px rgba(0,0,0,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--gray-lt);color:var(--ink);font-size:15px;min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--crimson);padding:0 2rem;display:flex;align-items:center;gap:14px;border-bottom:4px solid var(--crimson-dk);box-shadow:0 2px 10px rgba(169,5,51,.3);position:sticky;top:0;z-index:200}
.hdr-icon{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:10px 0}
.hdr-text{flex:1}
.hdr-text h1{font-family:var(--fd);font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--white);line-height:1.1}
.hdr-text p{font-size:11px;color:rgba(255,255,255,.65);letter-spacing:.8px;text-transform:uppercase;margin-top:1px}

/* ── LAYOUT ── */
.wrap{max-width:1060px;margin:0 auto;padding:1.75rem 1.5rem}

/* ── FILTER CARD ── */
.filter-card{background:var(--white);border-radius:var(--rlg);box-shadow:var(--shadow);padding:1.25rem 1.5rem;margin-bottom:1rem}
.filter-card-title{font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray-dk);margin-bottom:.875rem}
.filter-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.filter-field{display:flex;flex-direction:column;gap:5px;flex:1;min-width:180px}
.filter-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--gray-dk)}
.filter-field select{font-family:var(--fb);font-size:14px;color:var(--ink);background:var(--white);border:1.5px solid var(--gray-md);border-radius:var(--r);padding:9px 10px;width:100%;outline:none;transition:border-color .15s;cursor:pointer}
.filter-field select:focus{border-color:var(--crimson)}
.btn-clear{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;padding:9px 16px;border-radius:var(--r);border:2px solid var(--gray-md);background:transparent;color:var(--ink-soft);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-clear:hover{border-color:var(--crimson);color:var(--crimson)}

/* ── RESULTS HEADER ── */
.results-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.results-title{font-family:var(--fd);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft)}
.vtoggle{display:flex;border:1.5px solid var(--gray-md);border-radius:var(--r);overflow:hidden}
.vtoggle button{font-family:var(--fd);font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;padding:6px 13px;background:var(--white);border:none;color:var(--gray-dk);cursor:pointer;transition:all .15s}
.vtoggle button.on{background:var(--crimson);color:var(--white)}
.vtoggle button:not(.on):hover{background:var(--crimson-bg);color:var(--crimson)}

/* ── MAIN PANEL ── */
.panel{background:var(--white);border-radius:var(--rlg);box-shadow:var(--shadow);padding:1.5rem;margin-bottom:1rem}

/* ── STATE MESSAGES ── */
.state-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;gap:.75rem;color:var(--gray-dk)}
